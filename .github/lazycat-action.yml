version: 1

project:
  root: .
  build_config: lzc-build.yml
  package_file: package.yml
  output: dist/aiclient2api.lpk

update:
  strategy: publish
  allow_downgrade: false
  version_source:
    type: image
    image: aiclient2api

build:
  run_buildscript: false

images:
  - id: aiclient2api
    target: service
    service: aiclient2api
    source: justlikemaki/aiclient-2-api
    channel: stable
    tag_regex: '^v?[0-9]+\.[0-9]+\.[0-9]+$'
    delivery:
      mode: lazycat

stores:
  official:
    enabled: false
    skip_if_version_exists: true
  private:
    enabled: true
    skip_if_version_exists: true
    name: AIClient2API
    summary: 将 AI 客户端转换为 API 端点的网关服务
